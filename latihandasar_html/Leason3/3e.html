<!DOCTYPE html>
<html>
<head>
<title>3e</title>
<style>
.apply{
    background-color: rgb(10,102,194);
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 20px;
    transition: background-color 0.3s;
}
.apply:hover{
    background-color: rgb(0,80,170);
}

.save{
    background-color: white;
    color: rgb(10,102,194);
    border: 2px solid rgb(10,102,194);
    padding: 10px 20px;
    border-radius: 20px;
    transition: border-width 0.2s;
}
.save:hover{
    border-width: 3px;
}
</style>
</head>
<body>

<button class="apply">Apply on company website</button>
<button class="save">Save</button>

</body>
</html>

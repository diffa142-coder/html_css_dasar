<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
  font-family: Arial, sans-serif;
  background-color: rgb(240, 240, 240);
  padding: 10px;
}

.card {
  width: 200px;
  background-color: white;
  display: inline-block; 
  vertical-align: top;
  box-shadow: 0px 0px 5px rgba(0, 0, 0, 0.2);
  border-radius: 4px; 
  overflow: hidden; 
}

.profile-pic {
  width: 100%; 
  height: 200px;
  object-fit: cover;
  display: block;
}

.name {
  font-weight: bold;
  font-size: 18px;
  margin-top: 12px;
  margin-left: 10px;
  margin-bottom: 5px;
}

.image {
    width: 30px;
    height: 30px;
    border-radius: 15px;
    object-fit: cover;
    display: inline-block;
    margin: 10px;
    vertical-align: middle;
}

.mutual-friends {
  color: gray;
  font-size: 14px;
  display: inline-block;
  vertical-align: middle;
}

.add-friend-button {
  background-color: rgb(24, 119, 242);
  color: white;
  border: none;
  padding-top: 10px;
  padding-bottom: 10px;
  padding-left: 20px;
  padding-right: 20px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 14px;
  margin-left: 10px;
  margin-bottom: 12px;
  transition: background-color 0.15s, opacity 0.15s;
}

.add-friend-button:hover {
  background-color: rgb(20, 100, 210);
}

.add-friend-button:active {
  opacity: 0.8;
}
    </style>
    

<body>
    <div class="card">
      <img class="profile-pic" src="../../image/Kucing2.jpg">
      
        <p class="name">Rexy</p>
    
        <img class="image" src="../../image/Kucing.jpg" alt="kucing">
        
        <p class="mutual-friends">2 mutual friends</p>
        
        <button class="add-friend-button">
          Add Friend
        </button>
    </div>

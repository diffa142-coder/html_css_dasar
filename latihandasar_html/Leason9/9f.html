<!DOCTYPE html>
<html>
<head>
<title>Profile Card</title>

<style>
body{
    background:#eeeeee;
    font-family:Arial, sans-serif;
}

.card{
    width:220px;
    background:white;
    margin:50px;
    box-shadow:0px 2px 5px gray;
}

.card img{
    width:100%;
}

.info{
    padding:10px;
}

.info h3{
    margin:5px 0;
}

.info p{
    color:gray;
    margin-bottom:10px;
}

button{
    background:#3b82f6;
    color:white;
    border:none;
    padding:8px 12px;
    border-radius:5px;
}
</style>

</head>
<body>

<div class="card">
    <img src="ini_mobil_sport_termahal_di_dunia.jpg">

    <div class="info">
        <h3>Oliver</h3>
        <p>2 mutual friends</p>
        <button>Add Friend</button>
    </div>
</div>

</body>
</html>

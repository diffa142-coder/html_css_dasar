<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        .email {
            width: 0px;
            margin-bottom: 3px;
            font-size: 18px;
            color: gray;
        }

        .search-box {
            padding: 5px 15px;
            border: 1px solid #000;
            border-radius: 5px;
            width: 300px;
        }

        .font {
            margin-top: 10px;
            font-size: 14px;
            color: gray;
        }

        .button {
            background-color: rgb(90, 126, 236);
            color: white;
            border: none;
            padding: 15px 112px;
            border-radius: 50px;
        }

    </style>
</head>
<body>
    <p class="email">Email</p>
    <input type="search" class="search-box"> 
    <p class="font">By clicking Agree & Join, you agree to the Privacy Policy.</p>
    <button class="button">Agree & Join</button>

</body>
</html>

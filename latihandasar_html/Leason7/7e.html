<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
     body {
         text-align: center;
    }
        
         .search-box {
            border: none;
            outline: none;
            box-shadow: 1px 4px 20px rgba(0,0,0,0.1);
            padding: 12px 20px;
            border-radius: 25px;
            width: 300px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .search-box:focus {
            box-shadow: 0px 6px 15px rgba(0,0,0,0.15);
        }
    


    </style>
</head>
<body>
   <input type="search" class="search-box" placeholder="With a shadow, and no border Search Google or type a URL"> 
</body>
</html>

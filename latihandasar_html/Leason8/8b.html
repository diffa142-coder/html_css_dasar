<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    body {
            margin-left: auto;
        }    
        .button-yes {
            align-items: center;
            display: inline-block;
            vertical-align: middle;
            background-color: whitesmoke;
            color: black;
            border: 1px solid grey;
            border-radius: 3px;
            font-size: 16px;
        }

        .button-no {
            align-items: center;
            display: inline-block;
            vertical-align: middle;
            background-color: whitesmoke;
            color: black;
            border: 1px solid grey;
            border-radius: 3px;
            font-size: 16px;
        }

    </style>    
</head>
<body>
    <div style="display: flex; align-items: center; gap: 20px; max-width: 500px;">
            <p style="margin: 0; font-family: serif; font-size: 18px;">Thanks for chatting with our<br> customer support. Would you<br> like to take our quick survey?</p>
    <div style="display: flex; gap: 3px;">
            <button style="padding: 3px 10px;" class="button-yes">Yes</button>
            <button style="padding: 3px 10px;" class="button-no">No</button>
    </div>
    </div>
</body>
</html>

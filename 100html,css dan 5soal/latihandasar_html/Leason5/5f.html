<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: arial;
        }

        .font1 {
            font-size: 50px;
            font-weight: bold;
            margin-bottom: 0px;
        }

        .font2 {
            font-size: 24px;
            color: gray;
            margin-bottom: 0px;
         }

        .today {
            font-size: 18px;
            color: green;
            margin-bottom: 0px;
        }

        .After1 {
            font-size: 18px;
            margin-bottom: 0px;
            color: grey
        }

        .After2 {
            font-size: 18px;
            margin-bottom: 0px;
            color: red;
        }

    </style>
</head>
<body>
    <p class="font1">1,049.61 <span class="font2">USD</span></p>   
    <p class="today">+18.05 (1.75%) today</p>
    <p class="After1">After hours 1,048.00 <span class="After2">-1.61 (0.15%)</span></p>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    body {
        align-items: center;
    }

        .container {
            text-align: center;
            margin-bottom: 15px;
        }

        .search-box {
            width: 580px;
            padding: 12px 20px;
            border: 1px solid #dfe1e5;
            border-radius: 24px;
            font-size: 16px;
            outline: none;
        }

        .button-search {
            color: black;
            padding: 5px;
            background-color: whitesmoke;
            margin-top: 5px;
            border: none;
        }

        .logo-google {
            width: 272px;
            margin-top: 100px;
        }
    
    </style>
</head>
<body>
    <div class="container">
  <img class="logo-google" src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_272x92dp.png">
</div>

<div class="container">
  <input class="search-box" type="text" placeholder="Search Google or type a URL">
</div>

<div class="container">
  <button class="button-search">Google Search</button>
  <button class="button-search">I'm Feeling Lucky</button>
</div>
</body>
</html>

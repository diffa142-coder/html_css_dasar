<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .font{
            font-size: 18px;
            font-family: arial;
            color: black;
            font-size: 50px;
            margin-bottom: 5px;
        }

        .text-box1 {
            background-color: whitesmoke;
            color: black;
            border: none;
            font-size: 15px;
            font-family: arial;
            padding: 10px 20px;
            width: 300px;
            border-radius: 5px;
            margin-top: 0px;
        }

        .text-box2 {
            background-color: whitesmoke;
            color: black;
            border: none;
            font-size: 15px;
            font-family: arial;
            padding: 10px 20px;
            width: 300px;
            border-radius: 5px;
            margin-top: 10px;
        }

        .botton1 {
            background-color: black;
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 0px;
            margin-top: 20px;
        }

        .botton2 {
            background-color: whitesmoke;
            color: black;
            border: none;
            padding: 15px 25px;
            border-radius: 0px;
            margin-top: 20px;
        }


    </style>
</head>
<body>
    <p class="font">Request a ride now</p>
    <input type="text" class="text-box1" placeholder="Enter your location">
    <input type="text" class="text-box2" placeholder="Enter destination">
    <div>
        <button class="botton1">Request now</button>
        <button class="botton2">Schedule for later</button>
    </div>
    
</body>
</html>

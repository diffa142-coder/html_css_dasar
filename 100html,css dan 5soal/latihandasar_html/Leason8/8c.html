<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    body {
        align-items: center;
    }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;   
            height: 100vh;
            margin-bottom: 0; 
            display: flex;
            flex-direction: column; 
            align-items: center; 
            gap: 20px;             
            margin-top: 50px;          
        }

        .search-box {
            width: 400px;
            padding: 10px 20px;
            border-radius: 24px;
            border: 1px solid #dfe1e5;
            outline: none;
            box-shadow:1px 1px;
        }
    
    </style>
</head>
<body>
    <div class="container">
    <img src="images.png" alt="gambar">
    <input type="search" class="search-box" placeholder="Search">
</div>
</body>
</html>
